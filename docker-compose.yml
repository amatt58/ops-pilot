services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ops-pilot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ops_pilot
      POSTGRES_PASSWORD: ops_pilot_dev
      POSTGRES_DB: ops_pilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ops_pilot -d ops_pilot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
